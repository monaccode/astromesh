name: Release ADK

on:
  push:
    tags:
      - "adk-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build-adk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate ADK tag and package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#adk-v}"
          PYPROJECT_VERSION="$(python3 - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("astromesh-adk/pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          INIT_VERSION="$(python3 - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("astromesh-adk/astromesh_adk/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Missing __version__ in astromesh_adk/__init__.py")
          print(match.group(1))
          PY
          )"

          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version adk-v$TAG_VERSION does not match astromesh-adk/pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi

          if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Version mismatch between pyproject ($PYPROJECT_VERSION) and __init__.py ($INIT_VERSION)"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build astromesh-adk --sdist --wheel --outdir dist-adk

      - name: Upload ADK distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adk-dist
          path: dist-adk/*

  publish-testpypi:
    needs: build-adk
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi

    steps:
      - name: Download ADK distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: adk-dist
          path: dist-adk

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-adk

  smoke-test-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ADK from TestPyPI (with retry for indexing delay)
        run: |
          ADK_VERSION="${GITHUB_REF_NAME#adk-v}"
          python -m pip install --upgrade pip
          for i in 1 2 3 4 5; do
            echo "Attempt $i: installing astromesh-adk==${ADK_VERSION}"
            python -m pip install \
              --prefer-binary \
              --only-binary=:all: \
              --index-url https://pypi.org/simple \
              --extra-index-url https://test.pypi.org/simple \
              "astromesh-adk==${ADK_VERSION}" && break
            echo "Not yet available, waiting 30s..."
            sleep 30
          done

      - name: Verify import and CLI
        run: |
          python -c "import astromesh_adk; print(astromesh_adk.__version__)"
          astromesh-adk --help

  publish-pypi:
    needs: smoke-test-testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi

    steps:
      - name: Download ADK distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: adk-dist
          path: dist-adk

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-adk
