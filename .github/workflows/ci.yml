name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
      - "*.md"
      - ".superpowers/**"
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
      - "*.md"
      - ".superpowers/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync --extra all

      - name: Lint
        run: uv run ruff check astromesh/ tests/

      - name: Format check
        run: uv run ruff format --check astromesh/ tests/

      - name: Tests
        run: uv run pytest -v

  test-node:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
      - name: Run tests
        working-directory: astromesh-node
        run: |
          uv sync --extra test
          uv run pytest -v

  test-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
      - name: Run tests
        working-directory: astromesh-cli
        run: |
          uv sync --extra test
          uv run pytest -v

  test-orbit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
      - name: Install dependencies
        working-directory: astromesh-orbit
        run: uv sync --extra dev

      - name: Lint
        working-directory: astromesh-orbit
        run: uv run ruff check astromesh_orbit/ tests/

      - name: Format check
        working-directory: astromesh-orbit
        run: uv run ruff format --check astromesh_orbit/ tests/

      # Deselect orbit_gcp: those tests provision real GCP resources and need credentials.
      - name: Tests
        working-directory: astromesh-orbit
        run: uv run pytest -v -m "not orbit_gcp"

  test-forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # setup-node@v6, matching ci.yml's convention of recent majors (checkout@v7,
      # setup-python@v6). v7.0.0 exists but shipped 2026-07-14 — too fresh to adopt
      # blind. docs.yml still pins @v4; this is the newer of the two in-repo shapes.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: astromesh-forge/package-lock.json
      # `ci`, not `install`: the lockfile is authoritative and must not drift.
      - name: Install dependencies
        working-directory: astromesh-forge
        run: npm ci
      - name: Lint
        working-directory: astromesh-forge
        # --max-warnings 0: eslint exits 0 on warnings by default, which is how this
        # suite drifted red unnoticed in the first place.
        run: npx eslint . --max-warnings 0
      - name: Tests
        working-directory: astromesh-forge
        run: npm test
      - name: Build
        working-directory: astromesh-forge
        run: npm run build
