name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
      - "*.md"
      - ".superpowers/**"
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
      - "*.md"
      - ".superpowers/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra all

      - name: Lint
        run: uv run ruff check astromesh/ tests/

      - name: Format check
        run: uv run ruff format --check astromesh/ tests/

      - name: Tests
        run: uv run pytest -v

  test-node:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Run tests
        working-directory: astromesh-node
        run: |
          uv sync --extra test
          uv run pytest -v

  test-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Run tests
        working-directory: astromesh-cli
        run: |
          uv sync --extra test
          uv run pytest -v
