name: Release Astromesh CLI

on:
  push:
    tags: ["cli-v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/cli-v}"
          PYPROJECT_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('astromesh-cli/pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  release:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        working-directory: astromesh-cli
        run: |
          pip install build
          python -m build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-v${{ needs.validate-tag.outputs.version }}
          name: Astromesh CLI v${{ needs.validate-tag.outputs.version }}
          files: astromesh-cli/dist/*
          generate_release_notes: true
