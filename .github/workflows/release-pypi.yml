name: Release PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag and package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(python3 - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          INIT_VERSION="$(python3 - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("astromesh/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Missing __version__ in astromesh/__init__.py")
          print(match.group(1))
          PY
          )"

          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version v$TAG_VERSION does not match pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi

          if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Version mismatch between pyproject ($PYPROJECT_VERSION) and __init__.py ($INIT_VERSION)"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build . --sdist --wheel --outdir dist-core

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: dist-core/*

  publish-testpypi:
    needs: build-core
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: core-dist
          path: dist-core

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-core

  smoke-test-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install astromesh from TestPyPI
        run: |
          CORE_VERSION="${GITHUB_REF_NAME#v}"
          python -m pip install --upgrade pip
          python -m pip install \
            --prefer-binary \
            --only-binary=:all: \
            --index-url https://pypi.org/simple \
            --extra-index-url https://test.pypi.org/simple \
            "astromesh==${CORE_VERSION}"

      - name: Verify import and CLI
        run: |
          python -c "import astromesh; print(astromesh.__version__)"
          astromeshctl --help

  publish-pypi:
    needs: smoke-test-testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: core-dist
          path: dist-core

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-core
