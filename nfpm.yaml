name: astromesh
arch: amd64
platform: linux
version: "${VERSION}"
maintainer: "monaccode <dev@monaccode.com>"
description: "Astromesh Agent Runtime Platform"
homepage: "https://github.com/monaccode/astromesh"
license: MIT

depends:
  - python3 (>= 3.12)
  - python3-venv

contents:
  # Venv with all dependencies
  - src: staging/venv/**
    dst: /opt/astromesh/venv/

  # Symlinks to /usr/bin
  - src: /opt/astromesh/venv/bin/astromeshd
    dst: /usr/bin/astromeshd
    type: symlink
  - src: /opt/astromesh/venv/bin/astromeshctl
    dst: /usr/bin/astromeshctl
    type: symlink

  # Systemd unit
  - src: packaging/systemd/astromeshd.service
    dst: /lib/systemd/system/astromeshd.service

  # Config files (conffiles — apt preserves user edits)
  - src: config/runtime.yaml
    dst: /etc/astromesh/runtime.yaml
    type: config
  - src: config/providers.yaml
    dst: /etc/astromesh/providers.yaml
    type: config
  - src: config/channels.yaml
    dst: /etc/astromesh/channels.yaml
    type: config
  - src: config/agents/*
    dst: /etc/astromesh/agents/
    type: config
  - src: config/profiles/*
    dst: /etc/astromesh/profiles/
    type: config

scripts:
  preinstall: packaging/scripts/preinstall.sh
  postinstall: packaging/scripts/postinstall.sh
  preremove: packaging/scripts/preremove.sh
  postremove: packaging/scripts/postremove.sh
