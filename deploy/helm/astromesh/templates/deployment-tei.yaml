{{- range .Values.tei.instances }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "astromesh.fullname" $ }}-tei-{{ .name }}
  labels:
    {{- include "astromesh.labels" $ | nindent 4 }}
    app.kubernetes.io/component: tei-{{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "astromesh.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: tei-{{ .name }}
  template:
    metadata:
      labels:
        {{- include "astromesh.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: tei-{{ .name }}
    spec:
      containers:
        - name: tei-{{ .name }}
          image: "{{ $.Values.tei.image.repository }}:{{ $.Values.tei.image.tag }}"
          imagePullPolicy: {{ $.Values.tei.image.pullPolicy }}
          args:
            - "--model-id"
            - {{ .modelId | quote }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          {{- with .resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
