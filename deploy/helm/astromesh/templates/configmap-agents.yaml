{{- if .Values.config.agents }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "astromesh.fullname" . }}-agents
  labels:
    {{- include "astromesh.labels" . | nindent 4 }}
data:
  {{- range $filename, $content := .Values.config.agents }}
  {{ $filename }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
