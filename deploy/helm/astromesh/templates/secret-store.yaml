{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.secretStore.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: {{ .Values.externalSecrets.secretStore.kind | default "SecretStore" }}
metadata:
  name: {{ include "astromesh.fullname" . }}
  labels:
    {{- include "astromesh.labels" . | nindent 4 }}
spec:
  provider:
    {{- toYaml .Values.externalSecrets.secretStore.provider | nindent 4 }}
{{- end }}
