apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: providers.astromesh.io
  labels:
    app.kubernetes.io/part-of: astromesh
spec:
  group: astromesh.io
  names:
    kind: Provider
    listKind: ProviderList
    plural: providers
    singular: provider
    shortNames:
      - prov
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - type
                - endpoint
              properties:
                type:
                  type: string
                  enum:
                    - ollama
                    - vllm
                    - openai_compat
                    - hf_tgi
                    - llamacpp
                endpoint:
                  type: string
                models:
                  type: array
                  items:
                    type: string
                auth:
                  type: object
                  properties:
                    apiKeyEnv:
                      type: string
                    secretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                  additionalProperties: true
                healthCheck:
                  type: object
                  properties:
                    interval:
                      type: integer
                    timeout:
                      type: integer
                  additionalProperties: true
              additionalProperties: true
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                observedGeneration:
                  type: integer
                  format: int64
                message:
                  type: string
